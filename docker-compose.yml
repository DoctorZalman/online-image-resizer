services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      # - persist temp files between container restarts
      - /tmp/image-resizer:/tmp/image-resizer

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      # - local Docker uses internal service name; Railway uses public URL
      - PORT=80
      - BACKEND_URL=http://server:5000
    depends_on:
      - server